{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify - CipherCanvas</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'core/css/index.css' %}" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">CipherCanvas</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/encode">Encode</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/decode">Decode</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/verify">Verify</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- VERIFY SECTION -->
    <section class="verify-section py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 col-md-10">
            <div class="verify-card">
              <h2 class="text-center mb-4">Verify Image Integrity</h2>
              <p class="text-center text-secondary mb-4">
                Upload an image and provide the original SHA-256 hash to verify
                its integrity.
              </p>
              <form
                method="post"
                enctype="multipart/form-data"
                class="verify-form"
              >
                <div class="mb-3">
                  <label for="image" class="form-label">Select Image</label>
                  <input
                    type="file"
                    class="form-control"
                    id="image"
                    name="image"
                    accept="image/*"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="hash" class="form-label">SHA-256 Hash</label>
                  <input
                    type="text"
                    class="form-control"
                    id="hash"
                    name="hash"
                    placeholder="Enter the original SHA-256 hash"
                    required
                  />
                </div>
                <div class="text-center">
                  <button type="submit" class="btn btn-primary-custom">
                    Verify Integrity
                  </button>
                </div>
              </form>
              <div class="result mt-4">
                <h4>Verification Result:</h4>
                <p
                  class=text-success text-danger"
                >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
